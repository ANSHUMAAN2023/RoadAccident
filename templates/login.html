<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Accident Severity AI</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    margin:0;
}

/* Branding */

.brand{
    position:absolute;
    top:30px;
    text-align:center;
    color:white;
}

.brand h1{
    margin:0;
    font-size:28px;
}

.brand p{
    margin:5px 0 0 0;
    font-size:14px;
    opacity:0.8;
}

/* Glass Card */

.login-card{

    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.1);
    border-radius:15px;
    padding:40px;
    width:350px;

    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    color:white;
}

.login-card h2{
    text-align:center;
    margin-bottom:25px;
}

/* Inputs */

.login-card input{

    width:100%;
    padding:12px;
    margin:10px 0;

    border:none;
    border-radius:8px;

    outline:none;
}

/* Button */

.login-card button{

    width:100%;
    padding:12px;
    margin-top:15px;

    background:#00c6ff;
    background:linear-gradient(45deg,#00c6ff,#0072ff);

    border:none;
    border-radius:8px;

    color:white;
    font-size:16px;
    cursor:pointer;

    transition:0.3s;
}

.login-card button:hover{
    transform:scale(1.05);
}

/* Link */

.login-card p{

    text-align:center;
    margin-top:15px;
}

.login-card a{
    color:#00eaff;
    text-decoration:none;
}

/* Footer */

.footer{
    position:absolute;
    bottom:15px;
    color:white;
    font-size:13px;
    opacity:0.8;
}

</style>

</head>

<body>

<!-- Branding -->
<div class="brand">
<h1>🚦 Accident Severity AI</h1>
<p>Smart Prediction for Safer Roads</p>
</div>

<div class="login-card">

<h2>🔐 Login</h2>

<form method="POST" action="/login">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<p>Don't have an account? <a href="/register">Register</a></p>

</div>

<div class="footer">
© 2026 Accident Severity AI 
</div>

</body>
</html>
